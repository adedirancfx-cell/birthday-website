services:
  - type: web
    name: birthday-website
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: gunicorn birthday_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: birthday-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: birthday-db
    databaseName: birthday_db
    user: birthday_user